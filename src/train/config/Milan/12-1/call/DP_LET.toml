[data_args]
datasets = "Milan"
data_path = "data/milano.h5"
num_cells = 100
data_key = "call"
scale = true

[model_args]
pretrained_model_name_or_path = "DP_LET"

[model_args.config]
num_nodes = 100
seq_len = 12
pred_len = 1
num_heads = 16
num_hidden = 128
num_hidden_key_per_head = ""
num_hidden_value_per_head = ""
num_hidden_ff = 256
num_layers = 3
drop_rate = 0.2
attn_drop_rate = 0.0
fc_drop_rate = 0.2
flatten_drop_rate = 0.0
res_attn_scores = true
patch_lens = 4
stride = 2
padding_patch = "end"
if_revin = true
if_decomp = false
embed_type = "timeF"
if_denoise = false   
svd_cut = 6      



[training_args]
seed = 42
fp32 = true
output_dir = "outputs/model_output/DP_LET_Milan_call_12_1/"
num_train_epochs = 50
optim = "adamw_torch"
learning_rate = 1e-4
weight_decay = 0.01
lr_scheduler_type = "cosine"
report_to = "tensorboard"
log_level = "info"
log_level_replica = "warning"
logging_strategy = "steps"
logging_dir = "outputs/tensorboard/DP_LET_Milan_call_12_1/"
logging_steps = 10
logging_first_step = true
save_strategy = "epoch"
load_best_model_at_end = true
metric_for_best_model = "eval_loss"
greater_is_better = false
save_total_limit = 1
eval_strategy = "epoch"
warmup_ratio = 0.05
eval_on_start = true 
per_device_train_batch_size = 64
per_device_eval_batch_size = 5
dataloader_num_workers = 1
dataloader_pin_memory = false