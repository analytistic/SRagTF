[data_args]
datasets = "ETT"
data_path = "data/ETT/ETTh1.csv"
scale = true
scaler_type = "standary"

[model_args]
pretrained_model_name_or_path = "iTransformer"

[model_args.config]
seq_len=96
pred_len=96
use_norm=true
d_model=256
embed='fixed'
freq='h'
dropout=0.0
activation='relu'
d_ff=256
layers=2
n_heads=8
e_layers=2

[training_args]
seed = 2023
fp32 = true
output_dir = "outputs/model_output/iTransformer_ETTh1_96_96/"
num_train_epochs = 50
optim = "adamw_torch"
learning_rate = 1e-4
weight_decay = 0.01
lr_scheduler_type = "cosine"
report_to = "tensorboard"
log_level = "info"
log_level_replica = "warning"
logging_strategy = "steps"
logging_dir = "outputs/tensorboard/iTransformer_ETTh1_96_96/"
logging_steps = 10
logging_first_step = true
save_strategy = "epoch"
load_best_model_at_end = true
metric_for_best_model = "eval_mse"
greater_is_better = false
save_total_limit = 1
eval_strategy = "epoch"
warmup_ratio = 0.05
eval_on_start = true 
per_device_train_batch_size = 64
per_device_eval_batch_size = 5
dataloader_num_workers = 1
dataloader_pin_memory = false